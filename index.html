<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager | Hassan Butt</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <i class="fas fa-tasks"></i>
                    <h1>Task Manager</h1>
                </div>
                <div class="user-info">
                    <span>👋 Hassan Butt</span>
                    <div class="date-display" id="currentDate"></div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-list"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="totalTasks">0</span>
                        <span class="stat-label">Total Tasks</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="completedTasks">0</span>
                        <span class="stat-label">Completed</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <span class="stat-number" id="pendingTasks">0</span>
                        <span class="stat-label">Pending</span>
                    </div>
                </div>
            </div>

            <!-- Add Task Form -->
            <div class="add-task-section">
                <div class="add-task-form">
                    <input type="text" id="taskInput" placeholder="Add a new task..." />
                    <select id="prioritySelect">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>
                    <button id="addTaskBtn">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <button class="clear-btn" id="clearCompletedBtn">
                    <i class="fas fa-trash"></i> Clear Completed
                </button>
            </div>

            <!-- Task List -->
            <div class="task-list-section">
                <div class="task-list-header">
                    <h3>Your Tasks</h3>
                    <span class="task-count" id="taskCount">0 tasks</span>
                </div>
                <div id="taskList" class="task-list">
                    <!-- Tasks will be rendered here by JavaScript -->
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>&copy; 2026 Hassan Butt | Built with ❤️ for my portfolio</p>
            <div class="footer-links">
                <a href="https://github.com/Hassanbutt67" target="_blank"><i class="fab fa-github"></i></a>
                <a href="https://www.linkedin.com/in/hassan-butt-876558234/" target="_blank"><i class="fab fa-linkedin"></i></a>
                <a href="mailto:butthaan971@gmail.com"><i class="fas fa-envelope"></i></a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
